name: eval

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Eval mode"
        required: true
        default: full
        type: choice
        options: [quick, full]

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "flag=--quick" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "flag=--${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--full" >> "$GITHUB_OUTPUT"
          fi

      - name: Run eval harness
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          DAGSHUB_REPO_OWNER: ${{ secrets.DAGSHUB_REPO_OWNER }}
          DAGSHUB_REPO_NAME: ${{ secrets.DAGSHUB_REPO_NAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m backend.evals.run ${{ steps.mode.outputs.flag }} --publish

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-run-${{ github.run_id }}
          path: runtime_data/eval_runs/
          retention-days: 30
